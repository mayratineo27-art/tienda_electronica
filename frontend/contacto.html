<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto | All-ing</title>
    <style>
      :root {
        --bg: #f7f9ff;
        --bg-top: #e7eeff;
        --text: #1f2937;
        --muted: #60708a;
        --surface: #ffffff;
        --line: rgba(15, 23, 42, 0.12);
        --input-bg: #ffffff;
        --input-text: #1f2937;
        --input-line: rgba(15, 23, 42, 0.2);
        --nav-bg: rgba(255, 255, 255, 0.9);
        --accent: #00d4ff;
      }

      html[data-theme="dark"] {
        --bg: #0d1320;
        --bg-top: #1c2b49;
        --text: #eef2fb;
        --muted: #a0afcc;
        --surface: #131d31;
        --line: rgba(255,255,255,.11);
        --input-bg: #0f1728;
        --input-text: #ffffff;
        --input-line: rgba(255,255,255,.16);
        --nav-bg: rgba(13, 19, 32, 0.88);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 0%, var(--bg-top), var(--bg) 40%);
      }
      .container { width: min(1000px, 92%); margin: 0 auto; }
      header { border-bottom: 1px solid var(--line); background: var(--nav-bg); }
      .top {
        min-height: 68px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo {
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        gap: 0;
      }
      .logo-mark {
        width: 96px;
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 2px 8px rgba(46, 63, 175, 0.3));
      }
      .menu { list-style: none; display: flex; gap: 1rem; padding: 0; margin: 0; }
      .menu a { color: var(--muted); text-decoration: none; }
      .menu a.active, .menu a:hover { color: var(--text); }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: .8rem;
      }

      .theme-toggle {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
      }

      h1 { margin: 2rem 0 .5rem; }
      p { color: var(--muted); }

      form {
        margin: 1.6rem 0 2.4rem;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 1rem;
        display: grid;
        gap: .8rem;
      }
      label { font-weight: 700; font-size: .95rem; }
      input, textarea {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--input-line);
        background: var(--input-bg);
        color: var(--input-text);
        padding: .7rem;
      }
      textarea { min-height: 120px; resize: vertical; }
      button {
        justify-self: start;
        border: none;
        border-radius: 999px;
        padding: .65rem 1rem;
        font-weight: 700;
        color: #041a2d;
        background: linear-gradient(90deg, #00d4ff, #30f19f);
        cursor: pointer;
      }
      footer { border-top: 1px solid var(--line); padding: 1.2rem 0 2rem; color: var(--muted); }
    </style>
  </head>
  <body>
    <header>
      <div class="container top">
        <a class="logo" href="./index.html" aria-label="All-ing inicio">
          <img class="logo-mark" src="./assets/logo-alling.svg" alt="Logo original de All-ing" />
        </a>
        <div class="nav-actions">
          <ul class="menu">
            <li><a href="./index.html">Inicio</a></li>
            <li><a href="./categorias.html">Categorias</a></li>
            <li><a href="./ofertas.html">Ofertas</a></li>
            <li><a href="./marcas.html">Marcas</a></li>
            <li><a class="active" href="./contacto.html">Contacto</a></li>
          </ul>
          <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema" title="Cambiar tema">🌙</button>
        </div>
      </div>
    </header>

    <main class="container">
      <h1>Contacto comercial</h1>
      <p>Pagina dedicada para solicitudes, cotizaciones y soporte. Esto confirma arquitectura multipagina real.</p>

      <!-- Formulario base que luego puedes conectar a backend Express -->
      <form aria-label="formulario de contacto">
        <label for="nombre">Nombre</label>
        <input id="nombre" name="nombre" type="text" placeholder="Tu nombre completo" required />

        <label for="correo">Correo</label>
        <input id="correo" name="correo" type="email" placeholder="tu@email.com" required />

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" name="mensaje" placeholder="Cuéntanos qué necesitas"></textarea>

        <button type="submit">Enviar solicitud</button>
      </form>
    </main>

    <footer>
      <div class="container">ventas@netstorepro.com | +57 300 000 0000</div>
    </footer>

    <script src="./js/theme.js"></script>
  </body>
</html>
