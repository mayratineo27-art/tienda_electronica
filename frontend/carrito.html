<!DOCTYPE html>
<html lang="es">
  <head>
    <!-- Bloque de metadatos y configuracion de visualizacion -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrito | Tienda de Redes</title>
      <!-- Bloque de estilos: ordenado por capas para controlar la cascada -->
      <link rel="stylesheet" href="./css/variables.css" />
      <link rel="stylesheet" href="./css/base.css" />
      <link rel="stylesheet" href="./css/components.css" />
      <link rel="stylesheet" href="./css/pages.css" />
      <link rel="stylesheet" href="./css/responsive.css" />
  </head>
  <body class="page-cart">
    <!-- Bloque superior con titulo del modulo de compra -->
    <header role="banner">
      <h1>Resumen de Compra</h1>
    </header>

    <!-- Bloque de navegacion principal -->
    <nav aria-label="Navegacion principal">
      <ul>
        <li><a href="./index.html">Inicio</a></li>
        <li><a href="./catalogo.html">Catalogo</a></li>
        <li><a href="./carrito.html" aria-current="page">Carrito</a></li>
      </ul>
    </nav>

    <!-- Bloque principal: items del carrito y total -->
    <main>
      <!-- Seccion de articulos seleccionados por el usuario -->
      <section aria-labelledby="items-titulo">
        <h2 id="items-titulo">Productos agregados</h2>
        <p id="cart-status" role="status" aria-live="polite">Cargando carrito...</p>
        <div id="cart-items"></div>
      </section>

      <!-- Seccion de resumen financiero para confirmar compra -->
      <section aria-labelledby="resumen-titulo">
        <h2 id="resumen-titulo">Totales</h2>
        <p>Subtotal: <strong id="summary-subtotal">$0.00</strong></p>
        <p>Envio estimado: <strong id="summary-shipping">$0.00</strong></p>
        <p>Total: <strong id="summary-total">$0.00</strong></p>
        <button id="checkout-btn" type="button" aria-label="Proceder al pago">Continuar al pago</button>
      </section>
    </main>

    <!-- Bloque de pie de pagina para ayuda al usuario -->
    <footer>
      <p>Necesitas ayuda con tu compra? Contacta soporte.</p>
    </footer>

    <!-- Bloque de script: logica de persistencia y resumen del carrito -->
    <script type="module" src="./js/carrito.js"></script>
  </body>
</html>
